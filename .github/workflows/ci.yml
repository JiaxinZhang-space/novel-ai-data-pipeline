name: demo-pipeline-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Check public repository safety
        run: python scripts/check_public_repo.py
      - name: Run deterministic demo pipeline
        run: python scripts/run_demo.py --output-dir artifacts
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Verify console entry point
        run: novel-evidence --output-dir "${RUNNER_TEMP}/novel-evidence-cli" --quiet
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests dashboard
      - name: Verify committed artifacts are byte-stable
        run: git diff --exit-code -- artifacts
